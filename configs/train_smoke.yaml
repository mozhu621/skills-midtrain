# Smoke config: tiny pilot corpus, single GPU, 4 steps (use with --smoke)
model: Qwen/Qwen3.5-4B-Base
corpus_dir: data/debug/corpus_v1
output_dir: checkpoints/smoke

lr: 2.0e-5
lr_scheduler: cosine
warmup_steps: 2
weight_decay: 0.1
max_grad_norm: 1.0
epochs: 1
max_steps: 4

per_device_batch_size: 1
grad_accum: 1

gradient_checkpointing: true
attn_implementation: flash_attention_2
logging_steps: 1
save_steps: 9999
save_total_limit: 1
report_to: []
seed: 1234
